<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Text Converter (Offline)</title>
    <style>
        /* --- THEME DEFINITIONS (CSS VARIABLES) --- */
        :root, body[data-theme='light'] {
            --bg-primary: #f7fafc;
            --bg-secondary: #fff;
            --bg-tertiary: #f1f5f9;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --text-header: #1a202c;
            --border-primary: #e2e8f0;
            --border-secondary: #edf2f7;
            --focus-ring: rgba(59, 130, 246, 0.4);
            --focus-border: #3b82f6;
            --badge-bg: #ebf8ff;
            --badge-text: #2b6cb0;
            --btn-copy-bg: #4A5568;
            --btn-copy-hover: #2D3748;
        }

        body[data-theme='dark'] {
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #171d2b;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --text-header: #fff;
            --border-primary: #4a5568;
            --border-secondary: #2d3748;
            --focus-ring: rgba(96, 165, 250, 0.5);
            --focus-border: #60a5fa;
            --badge-bg: #2c5282;
            --badge-text: #bee3f8;
            --btn-copy-bg: #718096;
            --btn-copy-hover: #a0aec0;
        }
        
        body[data-theme='ocean'] {
            --bg-primary: #eef5f9;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e6f0f5;
            --text-primary: #0b3954;
            --text-secondary: #3d6b89;
            --text-header: #082c40;
            --border-primary: #c9d9e3;
            --border-secondary: #d8e4eb;
            --focus-ring: rgba(61, 107, 137, 0.4);
            --focus-border: #3d6b89;
            --badge-bg: #cce2f1;
            --badge-text: #0b3954;
            --btn-copy-bg: #3d6b89;
            --btn-copy-hover: #0b3954;
        }
        
        body[data-theme='forest'] {
            --bg-primary: #f0f4f0;
            --bg-secondary: #e6eae6;
            --bg-tertiary: #d9ded9;
            --text-primary: #3a4d39;
            --text-secondary: #587458;
            --text-header: #232d23;
            --border-primary: #c2c8c2;
            --border-secondary: #d1d6d1;
            --focus-ring: rgba(88, 116, 88, 0.4);
            --focus-border: #587458;
            --badge-bg: #c2d2c2;
            --badge-text: #232d23;
            --btn-copy-bg: #587458;
            --btn-copy-hover: #3a4d39;
        }
        
        body[data-theme='dusk'] {
            --bg-primary: #2a2438;
            --bg-secondary: #352f44;
            --bg-tertiary: #211e2c;
            --text-primary: #dbd8e3;
            --text-secondary: #a39cb5;
            --text-header: #ffffff;
            --border-primary: #5c5470;
            --border-secondary: #4a4458;
            --focus-ring: rgba(239, 112, 112, 0.4);
            --focus-border: #ef7070;
            --badge-bg: #5c5470;
            --badge-text: #f3f3f3;
            --btn-copy-bg: #8d86a3;
            --btn-copy-hover: #ef7070;
        }
		
        body[data-theme='midnight'] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #020617;
            --text-primary: #cbd5e1;
            --text-secondary: #94a3b8;
            --text-header: #f8fafc;
            --border-primary: #334155;
            --border-secondary: #1e293b;
            --focus-ring: rgba(56, 189, 248, 0.4);
            --focus-border: #38bdf8;
            --badge-bg: #0c4a6e;
            --badge-text: #7dd3fc;
            --btn-copy-bg: #334155;
            --btn-copy-hover: #475569;
        }

        body[data-theme='sepia'] {
            --bg-primary: #f4ecd8;
            --bg-secondary: #fdf6e3;
            --bg-tertiary: #eee8d5;
            --text-primary: #5b4636;
            --text-secondary: #856751;
            --text-header: #433422;
            --border-primary: #d5beab;
            --border-secondary: #e6d5c1;
            --focus-ring: rgba(181, 137, 0, 0.3);
            --focus-border: #b58900;
            --badge-bg: #eee8d5;
            --badge-text: #b58900;
            --btn-copy-bg: #856751;
            --btn-copy-hover: #5b4636;
        }

        body[data-theme='evergreen'] {
            --bg-primary: #0a1a12;
            --bg-secondary: #122b1e;
            --bg-tertiary: #050f0a;
            --text-primary: #a3b8ae;
            --text-secondary: #6b8c7d;
            --text-header: #e0eadd;
            --border-primary: #1d3d2c;
            --border-secondary: #122b1e;
            --focus-ring: rgba(74, 222, 128, 0.3);
            --focus-border: #4ade80;
            --badge-bg: #064e3b;
            --badge-text: #6ee7b7;
            --btn-copy-bg: #2d5a43;
            --btn-copy-hover: #3e7d5d;
        }

        body[data-theme='soft-gray'] {
            --bg-primary: #f2f2f2;
            --bg-secondary: #ffffff;
            --bg-tertiary: #e5e5e5;
            --text-primary: #444444;
            --text-secondary: #777777;
            --text-header: #222222;
            --border-primary: #cccccc;
            --border-secondary: #dddddd;
            --focus-ring: rgba(0, 0, 0, 0.1);
            --focus-border: #888888;
            --badge-bg: #dddddd;
            --badge-text: #222222;
            --btn-copy-bg: #777777;
            --btn-copy-hover: #444444;
        }
        
        /* --- Base Styles & Font Definitions --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        textarea, pre {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
        }

        /* --- Layout & Container --- */
        .container { max-width: 1024px; margin: 0 auto; padding: 1rem; }
        @media (min-width: 768px) { .container { padding: 2rem; } }
        
        /* --- Header & Theme Switcher --- */
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { font-size: 1.875rem; font-weight: 700; color: var(--text-header); margin: 0; }
        @media (min-width: 768px) { header h1 { font-size: 2.25rem; } }
        header p { margin-top: 0.5rem; color: var(--text-secondary); }
        .theme-switcher { margin-top: 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
        .theme-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-primary);
            border-radius: 0.375rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }
        .theme-btn.active {
            border-color: var(--focus-border);
            background-color: var(--badge-bg);
            color: var(--badge-text);
        }
        .theme-btn:hover:not(.active) { background-color: var(--bg-tertiary); }

        /* --- Main Grid Layout --- */
        main { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1024px) { main { grid-template-columns: repeat(2, 1fr); } }
        .full-width { grid-column: 1 / -1; }

        /* --- Input Section & Type Selector --- */
        .input-section { position: relative; }
        label { display: block; font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
        #input-text {
            width: 100%;
            height: 10rem;
            padding: 1rem;
            border: 2px solid var(--border-primary);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
            font-size: 1rem;
        }
        #input-text:focus { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); border-color: var(--focus-border); }
        #clear-btn { position: absolute; top: 0.75rem; right: 0.75rem; color: #a0aec0; background: none; border: none; cursor: pointer; }
        #clear-btn:hover { color: var(--text-primary); }
        #clear-btn svg { width: 1.5rem; height: 1.5rem; }
        
        /* New Styles for Input Type Selector */
        .input-type-selector {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .selector-label {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }
        .type-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border-primary);
            border-radius: 0.375rem;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .type-btn.active {
            border-color: var(--focus-border);
            background-color: var(--badge-bg);
            color: var(--badge-text);
        }
        .type-btn:hover:not(.active) { background-color: var(--bg-tertiary); }

        /* --- Output Sections --- */
        .output-grid { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .output-grid { grid-template-columns: repeat(2, 1fr); } }
        .output-box { position: relative; }
        .output-box.full-span { grid-column: 1 / -1; }
        .output-box pre {
            height: 8rem;
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-secondary);
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border-radius: 0.5rem;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            margin: 0;
            font-size: 0.875rem;
        }
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: var(--btn-copy-bg);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s ease-in-out, background-color 0.2s;
        }
        .output-box:hover .copy-btn { opacity: 1; }
        .copy-btn:active { background-color: var(--btn-copy-hover); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Universal Text Converter</h1>
            <p>Paste any text, and see it converted instantly.</p>
			<p>Written By Nick Ku at kyan4@lenovo.com</p>
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="dark">Dark</button>
                <button class="theme-btn" data-theme="light">Light</button>
                <button class="theme-btn" data-theme="midnight">Midnight</button>
                <button class="theme-btn" data-theme="sepia">Sepia</button>
                <button class="theme-btn" data-theme="evergreen">Evergreen</button>
                <button class="theme-btn" data-theme="soft-gray">Soft Gray</button>
                <button class="theme-btn" data-theme="ocean">Ocean</button>
                <button class="theme-btn" data-theme="forest">Forest</button>
                <button class="theme-btn" data-theme="dusk">Dusk</button>
            </div>
        </header>

        <main>
            <div class="full-width">
                <label for="input-text">Input</label>
                <div class="input-section">
                    <textarea id="input-text" placeholder="Type or paste text here..."></textarea>
                    <button id="clear-btn" title="Clear input">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                
                <div class="input-type-selector">
                    <span class="selector-label">Input Format:</span>
                    <button class="type-btn active" data-type="Text">Text</button>
                    <button class="type-btn" data-type="Hexadecimal">Hexadecimal</button>
                    <button class="type-btn" data-type="Decimal">Decimal</button>
                    <button class="type-btn" data-type="Binary">Binary</button>
                </div>
            </div>

            <div class="output-grid">
                
                <div class="output-box full-span">
                    <label for="output-text">Text</label>
                    <pre id="output-text"></pre>
                    <button class="copy-btn" data-target="output-text">Copy</button>
                </div>

                <div class="output-box">
                    <label for="output-hex">Hex (Uppercase)</label>
                    <pre id="output-hex"></pre>
                    <button class="copy-btn" data-target="output-hex">Copy</button>
                </div>

                <div class="output-box">
                    <label for="output-hex-prefix">Hex with Prefix (Uppercase)</label>
                    <pre id="output-hex-prefix"></pre>
                    <button class="copy-btn" data-target="output-hex-prefix">Copy</button>
                </div>

                <div class="output-box">
                    <label for="output-decimal">Decimal</label>
                    <pre id="output-decimal"></pre>
                    <button class="copy-btn" data-target="output-decimal">Copy</button>
                </div>

                <div class="output-box">
                    <label for="output-binary">Binary</label>
                    <pre id="output-binary"></pre>
                    <button class="copy-btn" data-target="output-binary">Copy</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputText = document.getElementById('input-text');
            const clearBtn = document.getElementById('clear-btn');
            
            const outputs = {
                text: document.getElementById('output-text'),
                hex: document.getElementById('output-hex'),
                hexPrefix: document.getElementById('output-hex-prefix'),
                decimal: document.getElementById('output-decimal'),
                binary: document.getElementById('output-binary'),
            };

            // --- Theme Switcher Logic ---
            const themeButtons = document.querySelectorAll('.theme-btn');
            
            function setActiveTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('converterTheme', theme);
                themeButtons.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
            }

            themeButtons.forEach(button => {
                button.addEventListener('click', () => {
                    setActiveTheme(button.dataset.theme);
                });
            });

            const savedTheme = localStorage.getItem('converterTheme') || 'dark';
			setActiveTheme(savedTheme);


            // --- Input Type Selection Logic ---
            let currentInputType = 'Text';
            const typeButtons = document.querySelectorAll('.type-btn');

            const placeholders = {
                'Text': 'Type or paste text here...',
                'Hexadecimal': 'e.g. 48 65 6C 6C 6F or 0x48 0x65...',
                'Decimal': 'e.g. 72 101 108 108 111...',
                'Binary': 'e.g. 01001000 01100101...'
            };

            typeButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Update Active State
                    typeButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    
                    // Update Current Type
                    currentInputType = button.dataset.type;
                    
                    // Update Placeholder
                    inputText.placeholder = placeholders[currentInputType];
                    
                    // Re-calculate based on new type
                    handleInputChange();
                });
            });

            // --- Conversion Logic ---
            const converters = {
                textToHex: text => [...text].map(char => char.charCodeAt(0).toString(16).toUpperCase().padStart(2, '0')).join(' '),
                textToDecimal: text => [...text].map(char => char.charCodeAt(0).toString(10)).join(' '),
                textToBinary: text => [...text].map(char => char.charCodeAt(0).toString(2).padStart(8, '0')).join(' '),
                hexToText: hex => { try { return hex.trim().replace(/0x/gi, '').split(/\s+/).filter(h => h).map(h => String.fromCharCode(parseInt(h, 16))).join(''); } catch (e) { return null; } },
                decimalToText: dec => { try { return dec.trim().split(/\s+/).filter(d => d).map(d => String.fromCharCode(parseInt(d, 10))).join(''); } catch (e) { return null; } },
                binaryToText: bin => { try { return bin.trim().split(/\s+/).filter(b => b).map(b => String.fromCharCode(parseInt(b, 2))).join(''); } catch (e) { return null; } }
            };

            // --- Main Update Function ---
            function handleInputChange() {
                const input = inputText.value;

                if (!input || input.trim() === '') {
                    clearOutputs();
                    return;
                }
                
                let baseText = '';
                switch (currentInputType) {
                    case 'Text': baseText = input; break;
                    case 'Hexadecimal': baseText = converters.hexToText(input); break;
                    case 'Decimal': baseText = converters.decimalToText(input); break;
                    case 'Binary': baseText = converters.binaryToText(input); break;
                }

                // If user enters invalid format for the selected type
                if (baseText === null || (baseText.includes('\uFFFD') && currentInputType !== 'Text')) {
                    clearOutputs();
                    outputs.text.textContent = "Invalid format for selected input type.";
                    return;
                }

                outputs.text.textContent = baseText;
                const hexVal = converters.textToHex(baseText);
                outputs.hex.textContent = hexVal;
                outputs.hexPrefix.textContent = hexVal.split(' ').filter(h => h).map(h => '0x' + h).join(' ');
                outputs.decimal.textContent = converters.textToDecimal(baseText);
                outputs.binary.textContent = converters.textToBinary(baseText);
            }

            function clearOutputs() {
                Object.values(outputs).forEach(el => el.textContent = '');
            }

            function clearAll() {
                inputText.value = '';
                handleInputChange();
            }

            // --- Event Listeners ---
            inputText.addEventListener('input', handleInputChange);
            clearBtn.addEventListener('click', clearAll);

            document.querySelectorAll('.copy-btn').forEach(button => {
                button.addEventListener('click', () => {
                    const targetId = button.dataset.target;
                    const targetElement = document.getElementById(targetId);
                    const textToCopy = targetElement.textContent;
                    if (!textToCopy) return;

                    navigator.clipboard.writeText(textToCopy).then(() => {
                        const originalText = button.textContent;
                        button.textContent = 'Copied!';
                        setTimeout(() => { button.textContent = originalText; }, 1500);
                    });
                });
            });
        });
    </script>
</body>
</html>
